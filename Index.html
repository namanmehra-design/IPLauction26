<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Fantasy Auction</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --cream: #F5E6CC;
            --cream-hover: #e0d0b5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-gradient); background-attachment: fixed; margin: 0; padding: 30px; color: var(--text-main); min-height: 100vh; }
        h1, h2, h3 { color: var(--cream); font-weight: 600; }
        h1 { text-align: center; margin-bottom: 30px; text-shadow: 0 2px 10px rgba(245, 230, 204, 0.2); }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); padding: 30px; }
        
        .nav-tabs { display: flex; gap: 15px; margin-bottom: 25px; padding: 10px; justify-content: center; }
        .nav-tabs button { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid transparent; padding: 12px 24px; border-radius: 8px; font-weight: 600; transition: all 0.3s ease; cursor: pointer; }
        .nav-tabs button:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-main); }
        .nav-tabs button.active { background: var(--cream); color: #0f172a; box-shadow: 0 4px 15px rgba(245, 230, 204, 0.3); }

        .tab-content { display: none; animation: fadeIn 0.4s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 20px; }
        label { font-weight: 400; display: block; margin-bottom: 8px; color: var(--text-muted); }
        input, select { padding: 12px 15px; width: 100%; max-width: 350px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text-main); font-family: inherit; font-size: 1em; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: var(--cream); }
        select option { background: #0f172a; color: var(--text-main); }

        button.primary-btn { background-color: var(--cream); color: #0f172a; border: none; cursor: pointer; padding: 12px 24px; font-weight: 700; border-radius: 8px; transition: all 0.3s ease; }
        button.primary-btn:hover { background-color: var(--cream-hover); transform: translateY(-2px); }
        button.danger-btn { background-color: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); cursor: pointer; padding: 12px 24px; font-weight: 700; border-radius: 8px; transition: all 0.3s ease; }
        button.danger-btn:hover { background-color: var(--danger); color: white; }

        /* Auction Card Specifics */
        .auction-block { text-align: center; padding: 40px 20px; border: 2px dashed var(--glass-border); border-radius: 16px; margin-bottom: 30px; background: rgba(0,0,0,0.4); }
        .player-name-huge { font-size: 3.5em; font-weight: 900; color: var(--cream); margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px;}
        .player-meta { font-size: 1.2em; color: var(--text-muted); margin-bottom: 20px; }
        .base-price { font-size: 2em; color: var(--success); font-weight: 700; margin-bottom: 30px; }

        .bidding-controls { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: flex-end; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--glass-border); }
        th { color: var(--cream); font-weight: 600; background: rgba(0,0,0,0.2); }
        
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .team-card { padding: 20px; position: relative; }
        .team-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--cream); opacity: 0.8; }
        
        .budget-display { font-size: 1.5em; font-weight: bold; color: var(--success); margin-bottom: 10px; display: block; }
        .alert { color: var(--danger); font-weight: 600; padding: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.3); display: none; margin-top: 15px; text-align: center; }
        
        /* Utility */
        .overseas-badge { background: rgba(245, 230, 204, 0.15); color: var(--cream); border: 1px solid var(--cream); padding: 3px 8px; border-radius: 12px; font-size: 0.75em; font-weight: 600; }
        .unsold-badge { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid var(--danger); padding: 3px 8px; border-radius: 12px; font-size: 0.75em; font-weight: 600; }
    </style>
</head>
<body>

    <h1>IPL 2026 Mega Auction</h1>

    <div class="nav-tabs glass-panel" id="navTabs" style="display: none;">
        <button id="btn-auction" class="active" onclick="switchTab('auction')">Auction Block</button>
        <button id="btn-teams" onclick="switchTab('teams')">Franchise Purses & Rosters</button>
        <button id="btn-roster" onclick="switchTab('roster')">Auction Ledger</button>
    </div>

    <div id="setup-tab" class="tab-content glass-panel active">
        <h2>Auction Setup</h2>
        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div class="form-group">
                <label>Number of Franchises (Max 10):</label>
                <input type="number" id="numTeams" min="2" max="10" value="4" onchange="generateTeamInputs()">
            </div>
            <div class="form-group">
                <label>Max Players per Team:</label>
                <input type="number" id="playersPerTeam" min="15" max="25" value="20">
            </div>
            <div class="form-group">
                <label>Budget per Team (in Crores):</label>
                <input type="number" id="teamBudget" min="10" max="200" value="100" step="0.1">
            </div>
        </div>
        
        <div id="teamNamesContainer" style="margin-top: 20px; border-top: 1px solid var(--glass-border); padding-top: 20px;"></div>
        <button class="primary-btn" onclick="startAuction()" style="margin-top: 20px; width: 100%; max-width: 350px;">Initialize Auction</button>
    </div>

    <div id="auction-tab" class="tab-content glass-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Live Auction Block</h2>
            <div>
                <select id="manualPlayerSelect" style="width: 250px; margin-right: 10px;">
                    <option value="">-- Nominate Specific Player --</option>
                </select>
                <button class="primary-btn" onclick="pullSpecificPlayer()">Bring to Block</button>
            </div>
        </div>

        <div class="auction-block" id="auctionBlockDisplay">
            <h3 style="color: var(--text-muted);">Click "Next Player" to begin the auction</h3>
        </div>

        <div class="bidding-controls" id="biddingControls" style="display: none;">
            <div class="form-group" style="margin: 0;">
                <label>Winning Bidder (Franchise):</label>
                <select id="winningTeamSelect"></select>
            </div>
            <div class="form-group" style="margin: 0;">
                <label>Winning Amount (Crores):</label>
                <input type="number" id="winningBidAmount" step="0.1" min="0.2" placeholder="e.g. 5.5">
            </div>
            <button class="primary-btn" onclick="sellPlayer()">🔨 SOLD!</button>
            <button class="danger-btn" onclick="markUnsold()">Pass / Unsold</button>
        </div>
        
        <div id="auctionAlert" class="alert"></div>

        <div style="text-align: center; margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
            <button class="primary-btn" onclick="pullRandomPlayer()" style="font-size: 1.2em; padding: 15px 40px;">🎲 Bring Up Random Player</button>
        </div>
    </div>

    <div id="teams-tab" class="tab-content glass-panel">
        <h2 style="margin-bottom: 30px;">Live Franchise Purses</h2>
        <div class="team-grid" id="teamGrid"></div>
    </div>

    <div id="roster-tab" class="tab-content glass-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Auction Ledger</h2>
            <button class="primary-btn" onclick="exportCSV()">Download CSV</button>
        </div>
        <div style="overflow-x: auto;">
            <table id="globalRosterTable">
                <thead>
                    <tr>
                        <th>Player Name</th>
                        <th>Role</th>
                        <th>Origin</th>
                        <th>Base Price (Cr)</th>
                        <th>Status</th>
                        <th>Winning Bid (Cr)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        // Data Setup with Player Roles & Origin
        const rawData = [
            // CSK
            {n:"Ruturaj Gaikwad", r:"Batter", o:false}, {n:"Ayush Mhatre", r:"Batter", o:false}, {n:"Dewald Brevis", r:"Batter", o:true}, {n:"MS Dhoni", r:"Wicketkeeper", o:false}, {n:"Urvil Patel", r:"Wicketkeeper", o:false}, {n:"Shivam Dube", r:"All-Rounder", o:false}, {n:"Jamie Overton", r:"All-Rounder", o:true}, {n:"Ramakrishna Ghosh", r:"Bowler", o:false}, {n:"Noor Ahmad", r:"Bowler", o:true}, {n:"Khaleel Ahmed", r:"Bowler", o:false}, {n:"Anshul Kamboj", r:"All-Rounder", o:false}, {n:"Gurjapneet Singh", r:"Bowler", o:false}, {n:"Nathan Ellis", r:"Bowler", o:true}, {n:"Shreyas Gopal", r:"Bowler", o:false}, {n:"Mukesh Choudhary", r:"Bowler", o:false}, {n:"Sanju Samson", r:"Wicketkeeper", o:false}, {n:"Akeal Hosein", r:"Bowler", o:true}, {n:"Prashant Veer", r:"All-Rounder", o:false}, {n:"Kartik Sharma", r:"Batter", o:false}, {n:"Matthew Short", r:"All-Rounder", o:true}, {n:"Aman Khan", r:"All-Rounder", o:false}, {n:"Sarfaraz Khan", r:"Batter", o:false}, {n:"Matt Henry", r:"Bowler", o:true}, {n:"Rahul Chahar", r:"Bowler", o:false}, {n:"Zak Foulkes", r:"All-Rounder", o:true},
            // MI
            {n:"Rohit Sharma", r:"Batter", o:false}, {n:"Suryakumar Yadav", r:"Batter", o:false}, {n:"Tilak Varma", r:"Batter", o:false}, {n:"Robin Minz", r:"Wicketkeeper", o:false}, {n:"Ryan Rickelton", r:"Wicketkeeper", o:true}, {n:"Hardik Pandya", r:"All-Rounder", o:false}, {n:"Naman Dhir", r:"All-Rounder", o:false}, {n:"Mitchell Santner", r:"All-Rounder", o:true}, {n:"Will Jacks", r:"All-Rounder", o:true}, {n:"Corbin Bosch", r:"All-Rounder", o:true}, {n:"Raj Bawa", r:"All-Rounder", o:false}, {n:"Trent Boult", r:"Bowler", o:true}, {n:"Jasprit Bumrah", r:"Bowler", o:false}, {n:"Deepak Chahar", r:"Bowler", o:false}, {n:"Ashwani Kumar", r:"Bowler", o:false}, {n:"Raghu Sharma", r:"Bowler", o:false}, {n:"AM Ghazanfar", r:"Bowler", o:true}, {n:"Shardul Thakur", r:"All-Rounder", o:false}, {n:"Sherfane Rutherford", r:"Batter", o:true}, {n:"Mayank Markande", r:"Bowler", o:false}, {n:"Quinton de Kock", r:"Wicketkeeper", o:true}, {n:"Danish Malewar", r:"Batter", o:false}, {n:"Mohammad Izhar", r:"Batter", o:false}, {n:"Atharva Ankolekar", r:"All-Rounder", o:false}, {n:"Mayank Rawat", r:"All-Rounder", o:false},
            // KKR
            {n:"Ajinkya Rahane", r:"Batter", o:false}, {n:"Angkrish Raghuvanshi", r:"Batter", o:false}, {n:"Anukul Roy", r:"All-Rounder", o:false}, {n:"Harshit Rana", r:"Bowler", o:false}, {n:"Manish Pandey", r:"Batter", o:false}, {n:"Ramandeep Singh", r:"All-Rounder", o:false}, {n:"Rinku Singh", r:"Batter", o:false}, {n:"Rovman Powell", r:"Batter", o:true}, {n:"Sunil Narine", r:"All-Rounder", o:true}, {n:"Umran Malik", r:"Bowler", o:false}, {n:"Vaibhav Arora", r:"Bowler", o:false}, {n:"Varun Chakravarthy", r:"Bowler", o:false}, {n:"Cameron Green", r:"All-Rounder", o:true}, {n:"Matheesha Pathirana", r:"Bowler", o:true}, {n:"Mustafizur Rahman", r:"Bowler", o:true}, {n:"Tejasvi Singh", r:"Bowler", o:false}, {n:"Rachin Ravindra", r:"All-Rounder", o:true}, {n:"Finn Allen", r:"Batter", o:true}, {n:"Tim Seifert", r:"Wicketkeeper", o:true}, {n:"Akash Deep", r:"Bowler", o:false}, {n:"Rahul Tripathi", r:"Batter", o:false}, {n:"Daksh Kamra", r:"Bowler", o:false}, {n:"Sarthak Ranjan", r:"Batter", o:false}, {n:"Prashant Solanki", r:"Bowler", o:false}, {n:"Kartik Tyagi", r:"Bowler", o:false},
            // Add other teams here if needed for full list. (Truncated for clean rendering, handles all dynamically).
            {n:"Shubman Gill", r:"Batter", o:false}, {n:"Rashid Khan", r:"Bowler", o:true}, {n:"Kagiso Rabada", r:"Bowler", o:true}, {n:"Pat Cummins", r:"Bowler", o:true}, {n:"Mitchell Starc", r:"Bowler", o:true}, {n:"Rishabh Pant", r:"Wicketkeeper", o:false}, {n:"KL Rahul", r:"Wicketkeeper", o:false}, {n:"Virat Kohli", r:"Batter", o:false}
        ];

        // Pedigree AI Algorithm - Assigns Base Prices
        const tier1 = ["Virat Kohli", "Rohit Sharma", "Jasprit Bumrah", "Hardik Pandya", "Suryakumar Yadav", "Rishabh Pant", "KL Rahul", "Pat Cummins", "Mitchell Starc", "Rashid Khan", "Trent Boult", "Sanju Samson", "Shubman Gill"];
        const tier2 = ["Ruturaj Gaikwad", "Shivam Dube", "Quinton de Kock", "Cameron Green", "Matheesha Pathirana", "Rinku Singh", "Sunil Narine", "Kagiso Rabada"];

        let players = rawData.map((p, i) => {
            let base = 0.2; // Default 20 Lakhs
            if (tier1.includes(p.n)) base = 2.0;
            else if (tier2.includes(p.n)) base = 1.5;
            else if (p.o) base = 0.5; // Default overseas to 50 Lakhs
            else if (p.r === "All-Rounder") base = 0.3; 

            return {
                id: i, name: p.n, role: p.r, isOverseas: p.o, 
                basePrice: base, status: 'available', // available, sold, unsold
                soldTo: null, soldPrice: null
            };
        });

        let fantasyTeams = [];
        let maxPlayersPerTeam = 20;
        let startingBudget = 100;
        let currentPlayerOnBlock = null;

        function generateTeamInputs() {
            const num = document.getElementById('numTeams').value;
            const container = document.getElementById('teamNamesContainer');
            container.innerHTML = '<h3 style="font-size:1.1em; color:var(--text-muted);">Enter Franchise Names:</h3>';
            for (let i = 1; i <= num; i++) {
                container.innerHTML += `<div class="form-group"><input type="text" id="teamName${i}" value="Franchise ${i}"></div>`;
            }
        }
        generateTeamInputs();

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-tabs button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId + '-tab').classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        function startAuction() {
            const num = document.getElementById('numTeams').value;
            maxPlayersPerTeam = parseInt(document.getElementById('playersPerTeam').value);
            startingBudget = parseFloat(document.getElementById('teamBudget').value);
            
            fantasyTeams = [];
            const teamSelect = document.getElementById('winningTeamSelect');
            teamSelect.innerHTML = '';

            for (let i = 1; i <= num; i++) {
                const name = document.getElementById(`teamName${i}`).value || `Franchise ${i}`;
                fantasyTeams.push({ name: name, budget: startingBudget, roster: [] });
                
                let opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                teamSelect.appendChild(opt);
            }

            document.getElementById('setup-tab').style.display = 'none';
            document.getElementById('navTabs').style.display = 'flex';
            
            populateManualDropdown();
            switchTab('auction');
            updateTeamsUI();
            updateRosterUI();
        }

        function populateManualDropdown() {
            const select = document.getElementById('manualPlayerSelect');
            select.innerHTML = '<option value="">-- Nominate Specific Player --</option>';
            
            // Sort alphabetically for easy finding
            let available = players.filter(p => p.status === 'available' || p.status === 'unsold').sort((a,b) => a.name.localeCompare(b.name));
            
            available.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = `${p.name} (${p.status === 'unsold' ? 'Unsold' : 'Available'})`;
                select.appendChild(opt);
            });
        }

        function setPlayerOnBlock(player) {
            currentPlayerOnBlock = player;
            document.getElementById('biddingControls').style.display = 'flex';
            document.getElementById('auctionAlert').style.display = 'none';
            document.getElementById('winningBidAmount').value = player.basePrice; // set default to base
            document.getElementById('winningBidAmount').min = player.basePrice;

            document.getElementById('auctionBlockDisplay').innerHTML = `
                <div style="display:inline-block; padding: 5px 15px; background: rgba(255,255,255,0.1); border-radius: 20px; margin-bottom: 15px;">Player #${player.id + 1}</div>
                <h2 class="player-name-huge">${player.name}</h2>
                <div class="player-meta">${player.role} | ${player.isOverseas ? '✈️ Overseas' : '🇮🇳 Indian'}</div>
                <div class="base-price">Base Price: ₹${player.basePrice.toFixed(2)} Cr</div>
            `;
        }

        function pullRandomPlayer() {
            const available = players.filter(p => p.status === 'available');
            if (available.length === 0) {
                alert("No more available players in the initial pool. You can manually call back Unsold players via the dropdown.");
                return;
            }
            const randomPlayer = available[Math.floor(Math.random() * available.length)];
            setPlayerOnBlock(randomPlayer);
        }

        function pullSpecificPlayer() {
            const id = document.getElementById('manualPlayerSelect').value;
            if (!id) return;
            const player = players.find(p => p.id == id);
            setPlayerOnBlock(player);
            document.getElementById('manualPlayerSelect').value = ''; // reset dropdown
        }

        function showAlert(msg) {
            const alertBox = document.getElementById('auctionAlert');
            alertBox.innerText = msg;
            alertBox.style.display = 'block';
        }

        function sellPlayer() {
            if (!currentPlayerOnBlock) return;
            
            const teamName = document.getElementById('winningTeamSelect').value;
            const bidAmount = parseFloat(document.getElementById('winningBidAmount').value);
            const team = fantasyTeams.find(t => t.name === teamName);

            // Validation Rules
            if (isNaN(bidAmount) || bidAmount < currentPlayerOnBlock.basePrice) {
                return showAlert(`Bid must be at least the base price of ₹${currentPlayerOnBlock.basePrice} Cr.`);
            }
            if (team.budget < bidAmount) {
                return showAlert(`Insufficient funds! ${team.name} only has ₹${team.budget.toFixed(2)} Cr remaining.`);
            }
            if (team.roster.length >= maxPlayersPerTeam) {
                return showAlert(`${team.name} roster is full (${maxPlayersPerTeam} max).`);
            }
            if (currentPlayerOnBlock.isOverseas) {
                const osCount = team.roster.filter(p => p.isOverseas).length;
                if (osCount >= 8) return showAlert(`${team.name} already has the maximum of 8 overseas players.`);
            }

            // Execute Transaction
            team.budget -= bidAmount;
            team.roster.push(currentPlayerOnBlock);
            
            currentPlayerOnBlock.status = 'sold';
            currentPlayerOnBlock.soldTo = team.name;
            currentPlayerOnBlock.soldPrice = bidAmount;

            // UI Reset
            currentPlayerOnBlock = null;
            document.getElementById('biddingControls').style.display = 'none';
            document.getElementById('auctionAlert').style.display = 'none';
            document.getElementById('auctionBlockDisplay').innerHTML = `
                <h2 style="color: var(--success); font-size: 2.5em; margin: 0;">🔨 SOLD!</h2>
                <p style="font-size: 1.2em;">To ${team.name} for ₹${bidAmount.toFixed(2)} Cr</p>
                <p style="color: var(--text-muted);">Ready for next player...</p>
            `;

            updateTeamsUI();
            updateRosterUI();
            populateManualDropdown();
        }

        function markUnsold() {
            if (!currentPlayerOnBlock) return;
            
            currentPlayerOnBlock.status = 'unsold';
            
            // UI Reset
            currentPlayerOnBlock = null;
            document.getElementById('biddingControls').style.display = 'none';
            document.getElementById('auctionAlert').style.display = 'none';
            document.getElementById('auctionBlockDisplay').innerHTML = `
                <h2 style="color: var(--danger); font-size: 2.5em; margin: 0;">❌ UNSOLD</h2>
                <p style="color: var(--text-muted);">Player returned to pool. Ready for next player...</p>
            `;

            updateRosterUI();
            populateManualDropdown();
        }

        function updateTeamsUI() {
            const grid = document.getElementById('teamGrid');
            grid.innerHTML = '';
            fantasyTeams.forEach(team => {
                let osCount = team.roster.filter(p => p.isOverseas).length;
                let html = `<div class="team-card glass-panel">
                    <h3 style="margin: 0 0 10px 0; font-size: 1.4em;">${team.name}</h3>
                    <div class="budget-display">Purse: ₹${team.budget.toFixed(2)} Cr</div>
                    <div style="display:flex; justify-content: space-between; font-size: 0.85em; color: var(--text-muted); padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <span>Squad: ${team.roster.length}/${maxPlayersPerTeam}</span>
                        <span style="color: ${osCount >= 8 ? 'var(--danger)' : 'inherit'}">OS: ${osCount}/8</span>
                    </div>
                    <ul style="list-style: none; padding: 0; margin: 10px 0 0 0; max-height: 250px; overflow-y: auto;">`;
                team.roster.forEach(p => {
                    html += `<li style="padding: 5px 0; display:flex; justify-content: space-between; font-size: 0.9em;">
                        <span>${p.name} ${p.isOverseas ? '<span class="overseas-badge">OS</span>' : ''}</span> 
                        <span style="font-weight:bold; color:var(--cream);">₹${p.soldPrice.toFixed(2)}</span>
                    </li>`;
                });
                html += `</ul></div>`;
                grid.innerHTML += html;
            });
        }

        function updateRosterUI() {
            const tbody = document.querySelector('#globalRosterTable tbody');
            tbody.innerHTML = '';
            players.forEach(p => {
                let statusHtml = p.status === 'available' ? 'Available' : (p.status === 'unsold' ? '<span class="unsold-badge">Unsold</span>' : `<span style="color:var(--success); font-weight:bold;">Sold to ${p.soldTo}</span>`);
                
                tbody.innerHTML += `<tr>
                    <td style="font-weight: 600;">${p.name}</td>
                    <td>${p.role}</td>
                    <td>${p.isOverseas ? '✈️ Overseas' : '🇮🇳 Indian'}</td>
                    <td>₹${p.basePrice.toFixed(2)}</td>
                    <td>${statusHtml}</td>
                    <td style="font-weight:700; color:var(--cream);">${p.soldPrice ? '₹' + p.soldPrice.toFixed(2) : '-'}</td>
                </tr>`;
            });
        }

        function exportCSV() {
            let csvContent = "data:text/csv;charset=utf-8,Player Name,Role,Origin,Base Price (Cr),Status,Sold To,Winning Bid (Cr)\n";
            players.forEach(p => {
                let row = `"${p.name}","${p.role}","${p.isOverseas ? 'Overseas' : 'Indian'}","${p.basePrice}","${p.status}","${p.soldTo || ''}","${p.soldPrice || ''}"`;
                csvContent += row + "\n";
            });
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "fantasy_auction_ledger.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
